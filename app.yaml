apiVersion: apps/v1
kind: Deployment
metadata:
  name: usermanagement-application
spec:
  replicas: 2
  selector:
    matchLabels:
      app: usermanagement-application
  template:
    metadata:
      labels:
        app: usermanagement-application
    spec:
      imagePullSecrets:
        - name: my-registry-secret
      containers:
        - name: usermanagement-application
          image: devopsritiks/usermanagement:latest
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://mysql-db:3306/userdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
            - name: SPRING_DATASOURCE_USERNAME
              value: "root"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "Root@123"
---
apiVersion: v1
kind: Service
metadata:
  name: usermanagement-application-svc
spec:
  type: NodePort
  selector:
    app: usermanagement-application
  ports:
    - port: 8081
      targetPort: 8081
      nodePort: 30080
